<!DOCTYPE html>

<title>Exercise 1</title>
</head>

<body>
<script>
  function calculateTotal(billAmount, tipPercentage) {
    return billAmount + (billAmount * tipPercentage / 100);
  }
  
  let total = calculateTotal(120, 10);
  console.log("Total Bill:", total);

  const calculateTotalArrow = (billAmount, tipPercentage) =>
    billAmount + (billAmount * tipPercentage / 100);

    let sumTotal = calculateTotalArrow(120, 10);
  console.log("Total Bill:", sumTotal);
</script>
</body>

</html>
