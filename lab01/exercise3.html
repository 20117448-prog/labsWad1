<body>
<script>

  const students = [
    { name: "John", age: 20, grade: "B" },
    { name: "Sarah", age: 17, grade: "A" },
    { name: "Michael", age: 19, grade: "C" },
    { name: "Emma", age: 18, grade: "B" },
    { name: "David", age: 21, grade: "A" }
  ];

  console.log("Number of students:", students.length);

  students.push({ name: "Olivia", age: 22, grade: "A" });

  console.log("Updated number of students:", students.length);

  console.log("Student Names:");

  students.forEach(student => {
    console.log(student.name);
  });
</script>
